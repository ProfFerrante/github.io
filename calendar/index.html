<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calendario semplice + Google Calendar</title>
<style>
  :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
  body{margin:0;padding:20px;background:#f4f6f8;color:#111}
  .container{max-width:900px;margin:0 auto}
  h1{font-size:1.2rem;margin-bottom:12px}
  .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .day{background:#fff;border-radius:6px;padding:8px;min-height:90px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .day header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:.9rem}
  .day button{font-size:.75rem;padding:4px 6px;border-radius:4px;border:1px solid #ddd;background:#f8fafb;cursor:pointer}
  .events{font-size:.85rem;display:flex;flex-direction:column;gap:6px}
  .event{background:#eaf4ff;border-left:4px solid #2b7cff;padding:6px;border-radius:4px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .ev-info{flex:1}
  .ev-actions{display:flex;gap:6px}
  .controls{display:flex;gap:8px;margin:14px 0;align-items:center}
  input,select,textarea{padding:8px;border-radius:6px;border:1px solid #d6d9dd;background:#fff}
  .form{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start}
  .form-row{grid-column:span 2}
  .actions{display:flex;gap:8px}
  .primary{background:#2b7cff;color:#fff;border:none;padding:10px 12px;border-radius:6px;cursor:pointer}
  .ghost{background:#fff;color:#111;border:1px solid #ccc;padding:10px 12px;border-radius:6px;cursor:pointer}
  .secondary{background:#e6e7ea;color:#111;border:1px solid #ccc;padding:10px 12px;border-radius:6px;cursor:pointer}
  .deleteBtn{background:#ffecec;color:#b00000;border:1px solid #f0b4b4;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:.8rem}
  @media (max-width:700px){.form{grid-template-columns:1fr}.day{min-height:70px}}
</style>
</head>
<body>
<div class="container">
  <h1>Calendario mensile semplice</h1>

  <div class="controls">
    <label>
      Mese:
      <select id="monthSelect"></select>
    </label>
    <label>
      Anno:
      <select id="yearSelect"></select>
    </label>
    <div style="margin-left:auto" id="legend"><strong>Legenda:</strong> usa "Aggiungi" sulla giornata per precompilare il form</div>
  </div>

  <div class="calendar" id="calendar"></div>

  <h2 style="margin-top:18px">Crea evento</h2>
  <form id="eventForm" class="form" onsubmit="return false;">
    <label>
      Titolo
      <input id="title" required />
    </label>
    <label>
      Data
      <input id="date" type="date" required />
    </label>
    <label>
      Ora inizio
      <input id="startTime" type="time" required />
    </label>
    <label>
      Ora fine
      <input id="endTime" type="time" required />
    </label>
    <label class="form-row">
      Descrizione
      <textarea id="description" rows="2"></textarea>
    </label>
    <div class="actions form-row">
      <button class="primary" id="addGoogle">Aggiungi a calendario Google</button>
      <button class="secondary" id="addLocal">Aggiungi solo al calendario locale</button>
    </div>
  </form>
</div>

<script>
(function(){
  const monthSelect = document.getElementById('monthSelect');
  const yearSelect = document.getElementById('yearSelect');
  const calendarEl = document.getElementById('calendar');
  const titleEl = document.getElementById('title');
  const dateEl = document.getElementById('date');
  const startEl = document.getElementById('startTime');
  const endEl = document.getElementById('endTime');
  const descEl = document.getElementById('description');
  const addLocalBtn = document.getElementById('addLocal');
  const addGoogleBtn = document.getElementById('addGoogle');

  const today = new Date();
  const defaultYear = today.getFullYear();
  const defaultMonth = today.getMonth();

  for(let m=0;m<12;m++){
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = new Date(0, m).toLocaleString('it-IT', {month:'long'});
    if(m===defaultMonth) opt.selected = true;
    monthSelect.appendChild(opt);
  }
  for(let y = defaultYear-2; y<= defaultYear+3; y++){
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    if(y===defaultYear) opt.selected = true;
    yearSelect.appendChild(opt);
  }

  function buildCalendar(year, month){
    calendarEl.innerHTML = '';
    const first = new Date(year, month, 1);
    const startDay = first.getDay(); // 0=Sun
    const weekNames = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
    for(let i=0;i<7;i++){
      const header = document.createElement('div');
      header.className = 'day';
      header.style.background='#f0f4f8';
      header.innerHTML = '<header style="justify-content:center;padding:6px 0;font-weight:600">'+weekNames[i]+'</header>';
      calendarEl.appendChild(header);
    }
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const pad = startDay;
    for(let i=0;i<pad;i++){
      const empty = document.createElement('div');
      empty.className = 'day';
      calendarEl.appendChild(empty);
    }
    for(let d=1; d<=daysInMonth; d++){
      const cell = document.createElement('div');
      cell.className = 'day';
      const header = document.createElement('header');
      header.innerHTML = '<span>'+d+'</span><button data-day="'+d+'">Aggiungi</button>';
      cell.appendChild(header);
      const eventsWrap = document.createElement('div');
      eventsWrap.className = 'events';
      cell.appendChild(eventsWrap);
      calendarEl.appendChild(cell);

      header.querySelector('button').addEventListener('click', ()=>{
        const mm = String(month+1).padStart(2,'0');
        const dd = String(d).padStart(2,'0');
        dateEl.value = `${year}-${mm}-${dd}`;
        startEl.value = '09:00';
        endEl.value = '10:00';
        titleEl.focus();
      });
    }
    renderEvents();
  }

  function isoLocalDateTime(dateStr, timeStr){
    const [y,m,d] = dateStr.split('-').map(Number);
    const [hh,mm] = timeStr.split(':').map(Number);
    const dt = new Date(y,m-1,d,hh,mm,0);
    return dt.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  }

  // events stored with unique IDs for deletion
  const events = {}; // key: YYYY-MM-DD -> array of {id,title,...}
  let idCounter = 1;

  function renderEvents(){
    document.querySelectorAll('.events').forEach(el=>el.innerHTML='');
    const selYear = Number(yearSelect.value);
    const selMonth = Number(monthSelect.value);
    const mm = String(selMonth+1).padStart(2,'0');

    for(const key in events){
      const arr = events[key];
      // find matching day cell
      const dayNum = key.split('-')[2];
      const cellButton = [...calendarEl.querySelectorAll('button[data-day]')].find(b=>{
        const parent = b.closest('.day');
        const header = parent.querySelector('header span');
        if(!header) return false;
        return header.textContent === String(Number(dayNum));
      });
      if(!cellButton) continue;
      const eventsWrap = cellButton.closest('.day').querySelector('.events');
      arr.forEach(ev=>{
        const evEl = document.createElement('div');
        evEl.className='event';
        const info = document.createElement('div');
        info.className='ev-info';
        info.innerHTML = `<strong>${escapeHtml(ev.title)}</strong><div style="font-size:.8rem">${ev.start} - ${ev.end}</div><div style="font-size:.75rem;color:#333;margin-top:4px">${escapeHtml(ev.description)}</div>`;
        const actions = document.createElement('div');
        actions.className='ev-actions';
        const del = document.createElement('button');
        del.className='deleteBtn';
        del.textContent='Elimina';
        del.addEventListener('click', ()=> {
          deleteEventById(key, ev.id);
        });
        actions.appendChild(del);
        evEl.appendChild(info);
        evEl.appendChild(actions);
        eventsWrap.appendChild(evEl);
      });
    }
  }

  function deleteEventById(key, id){
    if(!events[key]) return;
    events[key] = events[key].filter(e=>e.id!==id);
    if(events[key].length===0) delete events[key];
    renderEvents();
  }

  function escapeHtml(s){
    if(!s) return '';
    return s.replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; });
  }

  addLocalBtn.addEventListener('click', ()=>{
    if(!dateEl.value || !startEl.value || !endEl.value || !titleEl.value) return alert('Compila titolo, data e orari');
    const key = dateEl.value;
    if(!events[key]) events[key]=[];
    events[key].push({
      id: idCounter++,
      title: titleEl.value,
      description: descEl.value||'',
      start: startEl.value,
      end: endEl.value
    });
    renderEvents();
    titleEl.value=''; descEl.value='';
  });

  addGoogleBtn.addEventListener('click', ()=>{
    if(!dateEl.value || !startEl.value || !endEl.value || !titleEl.value) return alert('Compila titolo, data e orari');
    // First add to local
    const key = dateEl.value;
    if(!events[key]) events[key]=[];
    events[key].push({
      id: idCounter++,
      title: titleEl.value,
      description: descEl.value||'',
      start: startEl.value,
      end: endEl.value
    });
    renderEvents();

    // Then open Google Calendar create URL with description (details) properly encoded
    const startISO = isoLocalDateTime(dateEl.value, startEl.value);
    const endISO = isoLocalDateTime(dateEl.value, endEl.value);
    const text = encodeURIComponent(titleEl.value);
    // include description in details param (encode newlines)
    const details = encodeURIComponent(descEl.value || '');
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
    const tzParam = tz ? `&ctz=${encodeURIComponent(tz)}` : '';
    const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&details=${details}&dates=${startISO}/${endISO}${tzParam}`;
    window.open(url, '_blank');

    titleEl.value=''; descEl.value='';
  });

  monthSelect.addEventListener('change', ()=> buildCalendar(Number(yearSelect.value), Number(monthSelect.value)));
  yearSelect.addEventListener('change', ()=> buildCalendar(Number(yearSelect.value), Number(monthSelect.value)));

  buildCalendar(defaultYear, defaultMonth);

})();
</script>
